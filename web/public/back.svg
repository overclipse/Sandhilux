<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="g1" cx="20%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#c7d8f8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c7d8f8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#a5f3c4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a5f3c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="5%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Soft blobs -->
  <ellipse cx="260" cy="120" rx="420" ry="320" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="1220" cy="200" rx="360" ry="280" fill="url(#g2)" filter="url(#blur)"/>
  <ellipse cx="820" cy="820" rx="400" ry="300" fill="url(#g3)" filter="url(#blur)"/>
  <ellipse cx="80" cy="680" rx="300" ry="240" fill="url(#g4)" filter="url(#blur)"/>

  <!-- Subtle grid lines -->
  <g stroke="#2563eb" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="150" x2="1440" y2="150"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="450" x2="1440" y2="450"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="750" x2="1440" y2="750"/>
    <line x1="180" y1="0" x2="180" y2="900"/>
    <line x1="360" y1="0" x2="360" y2="900"/>
    <line x1="540" y1="0" x2="540" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/>
    <line x1="1260" y1="0" x2="1260" y2="900"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1380" cy="60" r="90" fill="none" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1.5"/>
  <circle cx="1380" cy="60" r="50" fill="none" stroke="#6366f1" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="60" cy="840" r="110" fill="none" stroke="#2563eb" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="60" cy="840" r="65" fill="none" stroke="#2563eb" stroke-opacity="0.09" stroke-width="1"/>
  <circle cx="720" cy="30" r="70" fill="none" stroke="#8b5cf6" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Small dots -->
  <circle cx="400" cy="250" r="2.5" fill="#3b82f6" fill-opacity="0.18"/>
  <circle cx="680" cy="180" r="2" fill="#6366f1" fill-opacity="0.2"/>
  <circle cx="1100" cy="400" r="3" fill="#8b5cf6" fill-opacity="0.15"/>
  <circle cx="900" cy="650" r="2" fill="#2563eb" fill-opacity="0.18"/>
  <circle cx="200" cy="500" r="2.5" fill="#06b6d4" fill-opacity="0.18"/>
  <circle cx="1300" cy="700" r="2" fill="#3b82f6" fill-opacity="0.15"/>
  <circle cx="500" cy="780" r="2" fill="#6366f1" fill-opacity="0.15"/>
</svg>
